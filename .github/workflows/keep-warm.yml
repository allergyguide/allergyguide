name: Keep Netlify Functions Warm

on:
  schedule:
    # Run every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual triggers

jobs:
  ping-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Ping OIT Bootstrap Function
        run: |
          curl -sS -o /dev/null -w "%{http_code}" -H "X-Keep-Warm: true" https://allergyguide.ca/.netlify/functions/oit-bootstrap
