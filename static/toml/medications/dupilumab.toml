[dupilumab]

# =====================================================================
# METADATA & HEADER
# =====================================================================

display_name = "Dupilumab"
otc = "no"
draft = true
categories = ["biologic"]
abbreviations = "CRSwNP - Chronic Rhinosinusitis with nasal polyps; EoE - eosinophilic esophagitis; CSU - chronic spontaneous urticaria"
brand_names = ["Dupixent"]

authors.primary = "JY"
authors.editors = "TBD"
authors.staff = "TBD"

# =====================================================================
# CORE CLINICAL INFO
# =====================================================================

moa = "IL-4Rα antagonist; blocks both IL-4 and IL-13 signalling"
pregnancy = "Minimal data. IgG crosses the placenta. No information on breastfeeding."
side_effects_summary = "Generally well tolerated. Common AE is transient injection site erythema; ocular events (conjunctivitis, blepharitis) more in AD. Other AEs vary by indication."
severe_side_effects = """
**Post-market (frequency unknown):** arthralgia, facial rash, angioedema.

Onset of arthralgia variable, ranging from days to months after the first dose. Some patients' symptoms resolved while continuing treatment; others recovered following discontinuation.
"""
side_effects_source = ""
half_life = "Median washout time ~9–13 weeks in adults/adolescents; ~1.5× longer in children 6–11 yrs; ~2.5× longer in children <6 yrs."

ix_before = "no baseline investgiations required (could consider baseline CBC)."
ix_ongoing = ""
contraindications = ""                                                           # hypersensitivity but that's literally every drug...

available_forms = ["200 mg/1.14 mL or 300 mg/2 mL pre-filled syringe or pen"]
interactions_summary = "No severe interactions. CYP2D6 substrate metoprolol AUC increased ~29%; monitor if clinically relevant. Not studied with live vaccines; non-live vaccines fine."
severe_interactions = """
```text
In a clinical trial with 12-13 evaluable subjects with atopic dermatitis, the effects of dupilumab injection on the pharmacokinetics of caffeine (metabolized by CYP1A2), warfarin (metabolized by CYP2C9), omeprazole (metabolized by CYP2C19), metoprolol (metabolized by CYP2D6), and midazolam (metabolized by CYP3A4) were evaluated. The AUC of metoprolol increased by 29% after dupilumab injection administration (a SC loading dose of 600 mg followed by 300 mg SC weekly for 6 weeks). The AUC of other CYP substrates investigated were comparable before and after dupilumab injection administration.

DUPIXENT has not been studied with live vaccines.
```
"""
pearls = [
  "Does not significantly increase the risk of serious bacterial or opportunistic infections.",
  "Pre-filled **pen** is approved for adults and children ≥2 years; it hurts more than the syringe.",
  "Pre-filled **syringe** with can be used from 6 months of age.",
  "If a **weekly** dose is missed, administer as soon as possible and start a new weekly schedule from that date.",
]
estimated_cost = ">$20,000 / year CAD"

monograph_links = ["/monographs/dupilumab_2025_1.pdf"]


