# =====================================================================
# COVERAGE
# =====================================================================

[[dupilumab.coverage]]
indication = ["Asthma"]
province = ["BC"]
status = "Restricted"
tips = """
[PSP Enrolment Form (Asthma/CRSwNP)](https://oscargalaxy.org/download/dupixent-dupilumab-psp-enrolment-form-asthma-crswnp-en/)

**Adults & adolescents ≥12 yrs** — [Special Authority required](https://www2.gov.bc.ca/gov/content/health/practitioner-professional-resources/pharmacare/programs/limited-coverage-drug-program/limited-coverage-drugs-dupilumab) | [Form 5489](https://www2.gov.bc.ca/assets/gov/health/forms/5489fil.pdf)

Criteria (one of):
- Blood eosinophils ≥300 cells/µL **AND** ≥2 asthma exacerbations in past 12 months, **OR**
- Blood eosinophils ≥150 cells/µL on maintenance oral corticosteroids.

**Children 6–11 yrs** — [Special authority required](https://www2.gov.bc.ca/gov/content/health/practitioner-professional-resources/pharmacare/programs/limited-coverage-drug-program/limited-coverage-drugs-dupilumab-6-11) | [Form 5459](https://www2.gov.bc.ca/assets/gov/health/forms/5459fil.pdf)

Criteria (all required):
- Symptoms inadequately controlled on high-dose ICS + ≥1 additional controller
- Baseline ACQ-5 completed
- Blood eosinophils ≥150 cells/µL
- Uncontrolled asthma in past 12 months: ≥1 hospitalization/ER visit **OR** ≥2 systemic corticosteroid courses
"""

