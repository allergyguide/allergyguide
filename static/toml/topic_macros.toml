keywords = ["drug", "penicillin"]
content = '''
# Unlikely penicillin allergy
Clinical history is not suggestive of an penicillin allergy as:

Their cutaneous symptoms are not in keeping with urticaria expected in IgE-mediated allergy; the history was not concerning for serum sickness or severe cutaneous adverse drug reactions, such as Stevens Johnson Syndrome or Toxic Epidermal Necrolysis. Up to 95% of patients presenting with a rash following administration of an antibiotic do not in fact have a drug allergy, and rather the symptoms are most likely related to the infection itself rather than the penicillin.

Unverified penicillin allergy labels are common, and are associated with increased mortality (6-7%), surgical site infections (60% increase), multidrug-resistant organism infections (42% increase), and C. difficile infections (23-26% increase), primarily due to the use of suboptimal alternative antibiotics (see: https://pubmed.ncbi.nlm.nih.gov/39834819/, https://pubmed.ncbi.nlm.nih.gov/40122092/). As such, there is strong motivation for these patients to undergo an oral challenge for delabelling.

*** As their query reaction was within the past 6 months, we will arrange for a direct challenge at a later date.

The oral drug challenge in clinic today was well-tolerated. This type of testing does not exclude delayed hypersensitivities: we asked they monitor for rashes over the next week, take photos and contact our office if one appears. Future courses of penicillin may be given with no increased risk of allergic reaction compared to the general population for their age. 
'''

