# Chronic spontaneous urticaria (CSU) / Chronic inducible urticaria (CIndU).
This is a generally benign, histamine-mediated idiopathic primary skin disorder thought to be mediated by mast cells. CSU is typically a self-resolving condition over 1-5 years; CIndU is generally more long lived. In the vast majority of cases it is not a sign of more insidious underlying disease, though in some cases we arrange for baseline bloodwork to assess for rarer underlying causes.

- We will obtain CBC, CRP, TSH, anti-TPO, IgE, Calcium, SPEP, H. pylori serology
- We recommended avoidance of physical triggers, as well as NSAIDs and alcohol which can exacerbate symptoms
- For symptomatic management we recommend 2nd generation antihistamines, with titration to 4x the regular dose as required. We have provided:
  - Rupatadine 10mg PO OD, which can be titrated to 40mg OD if required
  - Bilastine 20mg PO OD, which can be titrated to 80mg OD if required
- The goal is complete control; thereafter, the dose may be slowly tapered to the minimal effective dose
- If refractory to maximal regular antihistamine, we will consider biologic anti IgE treatment (omalizumab)

