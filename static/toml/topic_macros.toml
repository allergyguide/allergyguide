content = '''
# Food Protein-Induced Enterocolitis Syndrome (FPIES) to: 
FPIES is a non-IgE mediated food allergy manifesting with delayed gastrointestinal symptoms. Typically, it is rare to have FPIES to multiple foods (25% of children react to 2 foods and less than 10% react to ≥ 3 foods). There is no diagnostic test for FPIES beyond oral challenge: diagnosis is usually based on clinical history. FPIES does not respond to epinephrine and there is no indication to carry an epinephrine auto-injector. The natural history of child-onset FPIES is excellent and most children will outgrow it within ~ 12 to 24 months.  

There are two main management options:
- 1) Strict avoidance of culprit foods, with consideration of oral challenge in ~1-2 years. However, with strict avoidance there is risk of development of an IgE mediated allergy
- 2) Starting an FPIES ladder to slowly reintroduce the food at home, starting with 1/64 teaspoon of the trigger food (using mini measuring teaspoons

On discussion, they have elected to pursue: 
We provided guidance on how to use the ladder and sent a copy to the family. In case of mild symptoms, previous tolerated dose should be resumed for another 4 weeks. They should otherwise strictly avoid the culprit food.

In case of accidental exposure or intractable nausea/emesis, Ondansetron 0.15 mg/kg can alleviate symptoms. Occasionally, moderate to severe dehydration may occur and requires IV rehydration, which may present as pallor, lethargy, or syncope - in this case, immediate medical attention should be sought.
'''

