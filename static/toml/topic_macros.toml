content = '''
Subcutaneous Immunotherapy (SCIT) to: 
- Build-up: 6-9 months of weekly injections → monthly maintenance for 3-5 years total
- Symptomatic benefit expected within 1-2 years with lasting benefit post-completion 
- Risks: local reactions are common and should be treated with PRN 2nd generation antihistamines; we also recommend prophylactic use 1 hour prior to injection. Anaphylaxis occurs in around 1/2000 injections and the risk of fatal anaphylaxis is around 1 in 2 million.
- Contraindications: uncontrolled asthma, FEV1<70, beta-blocker use, or significant cardiovascular comorbidity and lack of physiologic reserve. Dose escalation is contraindicated in pregnancy. If the patient becomes pregnant while on immunotherapy, our office should be contacted immediately 
- Safety: doses should be held temporarily if the patient is ill, and once maintenance doses are reached, **NEW MAINTENANCE VIAL DOSES SHOULD BE INITIALLY REDUCED BY 50%**
- Serum ordered; will arrange follow-up for first injection once available
'''

