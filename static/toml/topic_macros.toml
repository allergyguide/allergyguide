# IgE-mediated food allergy
Index reaction and sensitized to:
No index reaction but sensitized to:

Broadly, management options include: 1) strict avoidance, or 2) immunotherapy (oral-OIT; sublingual-SLIT). OIT/SLIT is a form of food desensitization for IgE mediated allergies. It is highly effective at very young ages and may help to outgrow the allergy completely. In older children, teenagers and adults, food allergies are felt to be more fixed. Lifelong OIT/SLIT in these situations may be more helpful to protect against accidental exposure as opposed to aid in outgrowing the food allergy, but OIT (especially in older patients) comes at relatively increased risk of treatment-induced anaphylaxis. The overall process, potential side effects/adverse reactions and time commitment was reviewed. 

After discussing the above, they have decided to pursue: 

In the interim, they should strictly avoid these foods. We have prescribed an epinephrine auto-injector x2 that should be carried on them at all times, and reviewed an anaphylaxis action plan. Antihistamines do not improve mortality in the setting of anaphylaxis: the *only* life saving treatment is timely administration of epinephrine.

Their symptoms are most consistent with oral allergy syndrome, a type of reaction that typically remains localized and does not progress to anaphylaxis. Symptoms are characterized by predominantly oral itch, scratchy throat, mild rash or swelling of the lips and occasionally abdominal upset after eating certain fruits, vegetables or tree nuts. It results from cross-reactivity between tree pollens and several fresh fruits, nuts, and vegetables, and usually disappears with cooked or more processed foods. 

IgE suspected but unclear testing
While history is consistent with IgE-mediated allergy, there is not current evidence of IgE sensitization on SPT - however, these tests are not 100% sensitive. We have offered serum IgE testing and/or a graded oral challenge at a later date, and have also asked them to start/continue a food-symptom diary.

Non-immune reaction
The clinical history is inconsistent with IgE-mediated food allergy, and skin testing was negative. We recommended a slow introduction at home. Once they have tolerated the food consistently, they no longer need to carry their epinephrine autoinjector.
However, given ongoing avoidance and concern around re-introduction we have arranged an oral challenge to remove this label. They will continue to carry an epinephrine autoinjector until the challenge is completed.
'''

