EoE is a chronic Type 2 mediated inflammatory condition. The exact underlying etiology is not fully understood but felt to be food-related in many cases. Unfortunately, there are no skin tests or bloodwork that can identify culprit foods. The goal of treatment is both histological and clinical improvement.

> We have referred to GI / They should continue follow-up with their current GI; we defer to our colleagues regarding timing of repeat endoscopy
