# Atopic dermatitis / Eczema
Atopic dermatitis is a common chronic primary skin condition thought to be a result of a complex interplay of genetics, environmental irritants/allergens, and microbiota. For many patients, the eczema will improve as they get older.

Skin testing for foods without a history to suggest an IgE-mediated allergic reaction is not indicated as many false positives occur. Of note: empiric elimination diets in the general atopic dermatitis population have been unsuccessful based on available evidence and any perceived improvement may be due to the waxing and waning nature of the condition. However, avoiding allergenic foods can potentially lead to the development of food allergy. From a primary prevention standpoint, maintaining allergenic foods in the diet is protective against food allergy. 

Regular moisturization (at least BID) is a crucial part of management; there is strong evidence it reduces disease severity and need for prescription creams. We reviewed options such as (but not limited to) Vaseline, CeraVe, or Cetaphil creams. For disease flares we suggest:
  - Betaderm 0.1% ointment BID to body and Desonide 0.05% cream BID (or Protopic 0.1% ointment BID, or Hydrocortisone 2.5% cream BID) to face, until clear of ezcema
  - If eczema returns quickly, a maintenance schedule of topicals 2-3x/weekly to eczema-prone areas will be considered, with taper back to OTC moisturization with sustained control
> If symptoms are refractory, we can consider systemic therapies such as Dupilimab and further investigate for mimickers such as allergic contact dermatitis, cutaneous T cell lymphoma, scabies, or immunodeficiency
'''

